{"changed":true,"filter":false,"title":"django.yml","tooltip":"/.github/workflows/django.yml","value":"name: Django CPP CI/CD Pipeline\n\non:\n  push:\n    branches:\n      - main\n\njobs:\n  prebuild:\n    runs-on: ubuntu-latest\n\n    steps:\n      - name: Checkout repo\n        uses: actions/checkout@v3\n\n      - name: Set up Python\n        uses: actions/setup-python@v4\n        with:\n          python-version: \"3.11\"\n\n      - name: Install Python Dependencies\n        run: |\n          python -m pip install --upgrade pip\n          pip install -r requirements.txt\n\n      - name: Install OS Dependencies\n        run: |\n          sudo apt-get update\n          sudo apt-get install -y jq unzip wget\n\n      - name: Install Java 17 (Amazon Corretto)\n        run: |\n          sudo apt-get purge -y openjdk*\n          sudo apt-get install -y java-common\n          wget https://corretto.aws/downloads/latest/amazon-corretto-17-x64-linux-jdk.deb\n          sudo dpkg -i amazon-corretto-17-x64-linux-jdk.deb\n          export PATH=$JAVA_HOME/bin:$PATH\n          echo \"$java -version\"\n          echo \"Java version: $(java --version)\"\n          echo \"Java installation done\"\n\n\n  deploy:\n    runs-on: ubuntu-latest\n    needs: prebuild\n\n    steps:\n      - name: Download artifact\n        uses: actions/download-artifact@v4\n        with:\n          name: deploy-package\n\n      - name: Configure AWS Credentials\n        uses: aws-actions/configure-aws-credentials@v2\n        with:\n          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}\n          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}\n          aws-region: us-east-1\n\n      - name: Deploy to Elastic Beanstalk\n        uses: einaregilsson/beanstalk-deploy@v21\n        with:\n          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}\n          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}\n          application_name: X24262404-eb\n          environment_name: X24262404-eb-env\n          region: us-east-1\n          version_label: \"build-${{ github.run_number }}\"\n          deployment_package: deploy.zip\n          wait_for_deployment: false\n          \n","undoManager":{"mark":14,"position":15,"stack":[[{"start":{"row":166,"column":41},"end":{"row":166,"column":44},"action":"remove","lines":["env"],"id":2}],[{"start":{"row":166,"column":40},"end":{"row":166,"column":41},"action":"remove","lines":["-"],"id":3}],[{"start":{"row":166,"column":38},"end":{"row":166,"column":40},"action":"remove","lines":["eb"],"id":4}],[{"start":{"row":166,"column":37},"end":{"row":166,"column":38},"action":"remove","lines":["-"],"id":5}],[{"start":{"row":166,"column":28},"end":{"row":166,"column":37},"action":"remove","lines":["X24262404"],"id":6}],[{"start":{"row":166,"column":28},"end":{"row":166,"column":44},"action":"insert","lines":["X24262404-eb-env"],"id":7}],[{"start":{"row":165,"column":38},"end":{"row":165,"column":40},"action":"remove","lines":["eb"],"id":8}],[{"start":{"row":165,"column":37},"end":{"row":165,"column":38},"action":"remove","lines":["-"],"id":9}],[{"start":{"row":165,"column":28},"end":{"row":165,"column":37},"action":"remove","lines":["X24262404"],"id":10}],[{"start":{"row":165,"column":28},"end":{"row":165,"column":44},"action":"insert","lines":["X24262404-eb-env"],"id":11}],[{"start":{"row":165,"column":41},"end":{"row":165,"column":44},"action":"remove","lines":["env"],"id":12}],[{"start":{"row":165,"column":40},"end":{"row":165,"column":41},"action":"remove","lines":["-"],"id":13}],[{"start":{"row":61,"column":0},"end":{"row":140,"column":0},"action":"remove","lines":["      # -------------------------","      # Pylint full project linting","      # -------------------------","      - name: Run Pylint","        continue-on-error: true","        run: |","          pylint main --ignore=migrations ||