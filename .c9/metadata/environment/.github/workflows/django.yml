     - name: Set up Python","        uses: actions/setup-python@v4","        with:","          python-version: \"3.11\"","","      - name: Install Python Dependencies","        run: |","          python -m pip install --upgrade pip","          pip install -r requirements.txt","","      - name: Install OS Dependencies","        run: |","          sudo apt-get update","          sudo apt-get install -y jq unzip wget zip","","      - name: Install Java 17 (Amazon Corretto)","        run: |","          sudo apt-get purge -y openjdk*","          sudo apt-get install -y java-common","          wget https://corretto.aws/downloads/latest/amazon-corretto-17-x64-linux-jdk.deb","          sudo dpkg -i amazon-corretto-17-x64-linux-jdk.deb","          export PATH=$JAVA_HOME/bin:$PATH","          echo \"Java version: $(java --version)\"","          echo \"Java installation done\"","","      - name: Run Django checks","        run: |","          python manage.py check --deploy","","      - name: Collect static files","        run: |","          python manage.py collectstatic --noinput","","      - name: Create deployment package","        run: |","          # Create deployment zip with all necessary files","          zip -r deploy.zip . \\","            -x \"*.git*\" \\","            -x \"*__pycache__*\" \\","            -x \"*.pyc\" \\","            -x \"*.db.sqlite3\" \\","            -x \"*.log\" \\","            -x \".env*\" \\","            -x \"venv/*\" \\","            -x \"env/*\" \\","            -x \"*.vscode/*\" \\","            -x \"*.idea/*\"","          ","          # Verify zip contents","          unzip -l deploy.zip | head -20","          echo \"Deployment package size: $(du -sh deploy.zip | cut -f1)\"","","      - name: Upload deployment artifact","        uses: actions/upload-artifact@v4","        with:","          name: deploy-package","          path: deploy.zip","          retention-days: 7","          if-no-files-found: error","","  deploy:","    runs-on: ubuntu-latest","    needs: prebuild","    if: github.ref == 'refs/heads/main'","","    steps:","      - name: Download artifact","        uses: actions/download-artifact@v4","        with:","          name: deploy-package","          path: ./","","      - name: Verify deployment package","        run: |","          ls -la deploy.zip","          unzip -t deploy.zip","","      - name: Configure AWS Credentials","        uses: aws-actions/configure-aws-credentials@v4","        with:","          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}","          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}","          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}","          aws-region: us-east-1","","      - name: Deploy to Elastic Beanstalk","        uses: einaregilsson/beanstalk-deploy@v21","        with:","          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}","          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}","          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}","          application_name: X24262404-eb","          environment_name: X24262404-eb-env","          region: us-east-1","          version_label: \"build-${{ github.run_number }}\"","          deployment_package: deploy.zip","          wait_for_deployment: false","          wait_for_environment_recovery: false","","      - name: Get deployment status","        run: |","          echo \"Deployment initiated for version: build-${{ github.run_number }}\"","          echo \"Check AWS Elastic Beanstalk console for deployment status\""]}]]},"ace":{"folds":[],"scrolltop":1066,"scrollleft":0,"selection":{"start":{"row":117,"column":74},"end":{"row":117,"column":74},"isBackwards":false},"options":{"guessTabSize":true,"useWrapMode":false,"wrapToView":true},"firstLineState":{"row":81,"state":"start","mode":"ace/mode/yaml"}},"timestamp":1776074010007,"hash":"860f557d4407d4c95b1a3e03d98f4350b18458e2"}