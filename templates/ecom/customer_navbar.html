<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroMarket - Customer Navigation</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        /* Navbar Styles */
        .navbar-custom {
            background: linear-gradient(135deg, #2C5F2D 0%, #4A7856 100%) !important;
            padding: 0.8rem 2rem !important;
            position: fixed !important;
            width: 100%;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        
        .navbar-container {
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        
        .navbar-brand-custom {
            font-size: 1.8rem !important;
            font-weight: 700 !important;
            color: white !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .navbar-brand-custom:hover {
            transform: translateY(-2px);
        }
        
        .navbar-brand-custom i {
            color: #FFE5B4;
            font-size: 2rem;
            animation: leafFloat 3s ease-in-out infinite;
        }
        
        @keyframes leafFloat {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }
        
        .navbar-toggler {
            border: 2px solid rgba(255, 255, 255, 0.3) !important;
            padding: 0.5rem !important;
            background: transparent !important;
        }
        
        .navbar-toggler:focus {
            box-shadow: none !important;
            outline: none !important;
        }
        
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255, 255, 255, 1)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
        }
        
        .navbar-nav {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin: 0 1rem;
        }
        
        .nav-link-custom {
            color: white !important;
            font-weight: 500;
            padding: 0.6rem 1.2rem !important;
            border-radius: 30px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            position: relative;
            text-decoration: none;
        }
        
        .nav-link-custom:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            color: white !important;
        }
        
        .nav-link-custom::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #FFE5B4;
            transition: width 0.3s ease;
        }
        
        .nav-link-custom:hover::after {
            width: 50%;
        }
        
        /* Cart Button */
        .cart-btn {
            background: linear-gradient(135deg, #2C5F2D 0%, #1e431f 100%);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 0.95rem;
            white-space: nowrap;
            margin-left: 1rem;
        }
        
        .cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(44, 95, 45, 0.4);
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
            background: linear-gradient(135deg, #1e431f 0%, #2C5F2D 100%);
        }
        
        .cart-badge {
            background: #FFE5B4;
            color: #2C5F2D;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 700;
            margin-left: 5px;
        }
        
        /* Dropdown Menu */
        .dropdown-custom {
            position: relative;
        }
        
        .dropdown-menu-custom {
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border: none;
            border-radius: 15px;
            padding: 0.8rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            min-width: 220px;
            margin-top: 0.8rem;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1001;
        }
        
        .dropdown-custom:hover .dropdown-menu-custom {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .dropdown-item-custom {
            color: #2C5F2D;
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            font-size: 0.95rem;
        }
        
        .dropdown-item-custom:hover {
            background: linear-gradient(135deg, #2C5F2D 0%, #4A7856 100%);
            color: white;
            transform: translateX(5px);
        }
        
        .dropdown-item-custom i {
            width: 20px;
            font-size: 1.1rem;
        }
        
        .dropdown-divider {
            height: 1px;
            background: #e9ecef;
            margin: 0.5rem 0;
        }
        
        /* Search Form */
        .search-form {
            position: relative;
            min-width: 350px;
        }
        
        .search-input {
            width: 100%;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.95);
        }
        
        .search-input:focus {
            outline: none;
            box-shadow: 0 8px 30px rgba(44, 95, 45, 0.3);
            background: white;
        }
        
        .search-input::placeholder {
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        .search-btn {
            position: absolute;
            right: 5px;
            top: 5px;
            background: linear-gradient(135deg, #2C5F2D 0%, #4A7856 100%);
            border: none;
            color: white;
            padding: 0.4rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-btn:hover {
            background: linear-gradient(135deg, #1e431f 0%, #2C5F2D 100%);
            transform: translateX(-2px);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .search-form {
                min-width: 280px;
            }
        }
        
        @media (max-width: 992px) {
            .navbar-custom {
                padding: 0.6rem 1rem !important;
            }
            
            .navbar-container {
                position: relative;
            }
            
            .navbar-collapse {
                position: absolute;
                top: 100%;
                left: 1rem;
                right: 1rem;
                background: linear-gradient(135deg, #2C5F2D 0%, #4A7856 100%);
                padding: 1.5rem;
                border-radius: 20px;
                margin-top: 1rem;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
                max-height: 80vh;
                overflow-y: auto;
                z-index: 1000;
            }
            
            .navbar-nav {
                flex-direction: column;
                align-items: stretch;
                margin: 0 0 1rem 0;
                gap: 0.3rem;
            }
            
            .nav-link-custom {
                justify-content: flex-start;
                padding: 0.8rem 1rem !important;
                width: 100%;
            }
            
            .search-form {
                min-width: auto;
                width: 100%;
                margin: 1rem 0;
            }
            
            .dropdown-menu-custom {
                position: static;
                opacity: 1;
                visibility: visible;
                transform: none;
                box-shadow: none;
                margin-top: 0.5rem;
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                width: 100%;
            }
            
            .dropdown-item-custom {
                color: white;
            }
            
            .dropdown-item-custom:hover {
                background: rgba(255, 255, 255, 0.2);
                color: white;
            }
            
            .dropdown-divider {
                background: rgba(255, 255, 255, 0.2);
            }
            
            .cart-btn {
                width: 100%;
                justify-content: center;
                margin: 1rem 0 0 0;
            }
        }
        
        @media (max-width: 576px) {
            .navbar-brand-custom {
                font-size: 1.4rem !important;
            }
            
            .navbar-brand-custom i {
                font-size: 1.6rem;
            }
            
            .search-btn span {
                display: none;
            }
            
            .search-btn {
                padding: 0.4rem 1rem;
            }
            
            .search-btn i {
                margin: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom" id="mainNavbar">
        <div class="navbar-container">
            <!-- Brand -->
            <a class="navbar-brand-custom" href="/">
                <i class="fas fa-leaf"></i>
                <span>AgroMarket</span>
            </a>
            
            <!-- Toggler -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" 
                    aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- Navbar Content -->
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link-custom" href="/">
                            <i class="fas fa-home"></i>
                            <span>Home</span>
                        </a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link-custom" href="/my-order">
                            <i class="fas fa-box"></i>
                            <span>My Orders</span>
                        </a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link-custom" href="/my-profile">
                            <i class="fas fa-user"></i>
                            <span>Profile</span>
                        </a>
                    </li>
                    
                    <li class="nav-item dropdown-custom">
                        <a class="nav-link-custom" href="#" role="button">
                            <i class="fas fa-ellipsis-h"></i>
                            <span>More</span>
                            <i class="fas fa-chevron-down" style="font-size: 0.8rem; margin-left: 5px;"></i>
                        </a>
                        <div class="dropdown-menu-custom">
                            <a class="dropdown-item-custom" href="/send-feedback">
                                <i class="fas fa-comment"></i>
                                <span>Send Feedback</span>
                            </a>
                            <a class="dropdown-item-custom" href="#">
                                <i class="fas fa-question-circle"></i>
                                <span>Help Center</span>
                            </a>
                            <div class="dropdown-divider"></div>
                            <a class="dropdown-item-custom" href="/logout">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>Logout</span>
                            </a>
                        </div>
                    </li>
                </ul>
                
                <!-- Search Form -->
                <form class="search-form" action="/search" method="get">
                    <input type="search" class="search-input" name="query" 
                           placeholder="Search fresh vegetables, fruits, organic products..." required>
                    <button type="submit" class="search-btn">
                        <i class="fas fa-search"></i>
                        <span>Search</span>
                    </button>
                </form>
                
                <!-- Cart Button -->
                <a class="cart-btn" href="/cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span>My Cart</span>
                    <span class="cart-badge">{{ product_count_in_cart|default:'0' }}</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Close mobile menu when clicking outside
        document.addEventListener('click', function(event) {
            const navbar = document.getElementById('mainNavbar');
            const toggler = document.querySelector('.navbar-toggler');
            const collapse = document.getElementById('navbarContent');
            
            if (navbar && !navbar.contains(event.target) && collapse && collapse.classList.contains('show')) {
                if (toggler) {
                    toggler.click();
                }
            }
        });

        // Close mobile menu on link click
        document.querySelectorAll('.nav-link-custom, .dropdown-item-custom').forEach(link => {
            link.addEventListener('click', function(e) {
                // Don't close if it's a dropdown toggle on desktop
                if (window.innerWidth > 992 && this.closest('.dropdown-custom') && this.closest('.nav-link-custom')) {
                    return;
                }
                
                const navbarCollapse = document.getElementById('navbarContent');
                if (navbarCollapse && navbarCollapse.classList.contains('show')) {
                    const toggler = document.querySelector('.navbar-toggler');
                    if (toggler) {
                        toggler.click();
                    }
                }
            });
        });

        // Handle dropdowns on mobile
        if (window.innerWidth <= 992) {
            document.querySelectorAll('.dropdown-custom > .nav-link-custom').forEach(dropdown => {
                dropdown.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    // Close other open dropdowns
                    document.querySelectorAll('.dropdown-menu-custom').forEach(menu => {
                        if (menu !== this.nextElementSibling) {
                            menu.style.display = 'none';
                        }
                    });
                    
                    const menu = this.nextElementSibling;
                    if (menu) {
                        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
                    }
                });
            });
        }

        // Navbar scroll effect (optional - adds slight transparency on scroll)
        window.addEventListener('scroll', function() {
            const navbar = document.getElementById('mainNavbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'linear-gradient(135deg, rgba(44, 95, 45, 0.98) 0%, rgba(74, 120, 86, 0.98) 100%)';
                navbar.style.backdropFilter = 'blur(10px)';
            } else {
                navbar.style.background = 'linear-gradient(135deg, #2C5F2D 0%, #4A7856 100%)';
                navbar.style.backdropFilter = 'none';
            }
        });
    </script>
</body>
</html>
